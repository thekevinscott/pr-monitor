name: 'PR Monitor'
description: 'Waits for all other workflow checks to complete and reports aggregate status'
author: 'thekevinscott'

inputs:
  job-name:
    description: 'Name of the job running this action (required to exclude itself)'
    required: true
  excluded-jobs:
    description: 'Comma-separated list of additional job names to exclude from monitoring'
    required: false
    default: ''
  pre-sleep:
    description: 'Time in seconds to wait before checking (allows other workflows to start). Setup time (Node, npm install) is subtracted from this — if setup takes 8s and pre-sleep is 10s, the script sleeps 2s more.'
    required: false
    default: '10'
  check-interval:
    description: 'Time in seconds between status checks'
    required: false
    default: '5'
  timeout:
    description: 'Maximum time in minutes to wait for all checks'
    required: false
    default: '10'
  minimum-checks:
    description: 'Minimum number of non-excluded check runs that must appear before declaring success. Default 1 prevents the gate from passing before any other workflows register; set to 0 to allow docs-only PRs (with no other workflows) to pass.'
    required: false
    default: '1'
  github-token:
    description: 'GitHub token for API access'
    required: false
    default: ${{ github.token }}

runs:
  using: 'composite'
  steps:
    - name: Record action start (for pre-sleep absorption)
      id: timer
      shell: bash
      run: echo "ms=$(($(date +%s%N)/1000000))" >> "$GITHUB_OUTPUT"

    - name: Setup Node 24
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: npm
        cache-dependency-path: ${{ github.action_path }}/package-lock.json

    - name: Install runtime dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm ci --omit=dev --no-audit --no-fund --prefer-offline

    - name: Run monitor
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        JOB_NAME: ${{ inputs.job-name }}
        EXCLUDED_JOBS: ${{ inputs.excluded-jobs }}
        PRE_SLEEP: ${{ inputs.pre-sleep }}
        CHECK_INTERVAL: ${{ inputs.check-interval }}
        TIMEOUT: ${{ inputs.timeout }}
        MINIMUM_CHECKS: ${{ inputs.minimum-checks }}
        ACTION_START_MS: ${{ steps.timer.outputs.ms }}
      run: ./node_modules/.bin/tsx src/entry.ts

branding:
  icon: 'check-circle'
  color: 'green'
