name: Testing Conventions

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  conventions:
    # thekevinscott/testing-conventions reusable workflow: enforces colocated unit
    # tests and the unit-suite coverage floor (vitest v8) for the TypeScript sources
    # under src/. Thresholds and exemptions live in testing-conventions.toml.
    # The TypeScript coverage job installs deps with pnpm — already this repo's
    # package manager. Set `version:` to freeze the tool for reproducible runs;
    # left unset it tracks the latest published release.
    uses: thekevinscott/testing-conventions/.github/workflows/testing-conventions.yml@v0
    with:
      languages: '["typescript"]'
      path: src
      config: testing-conventions.toml
